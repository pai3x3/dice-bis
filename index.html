    function updateSpecOptions() {
        const cls = document.getElementById('classSelect').value;
        const specSel = document.getElementById('specSelect');
        const display = document.getElementById('mainDisplay');
        specSel.innerHTML = '<option value="">-- 전문화 선택 --</option>';
        if (!cls) { display.innerHTML = '<div class="welcome-msg">왼쪽 패널에서 직업과 전문화를 선택해 주세요.</div>'; return; }
        if (DATA_DB[cls]) { for (let key in DATA_DB[cls].specs) { specSel.innerHTML += `<option value="${key}">${DATA_DB[cls].specs[key]}</option>`; } }
    }

    function renderComparison() {
        const cls = document.getElementById('classSelect').value;
        const spec = document.getElementById('specSelect').value;
        const display = document.getElementById('mainDisplay');
        if (!cls || !spec) return;

        const specData = DATA_DB[cls].items[spec];
        if (!specData) return;

        display.innerHTML = `<h2> BiS 리스트 (Wowhead)</h2><table><thead><tr><th style="width:100px;">부위</th><th>아이템 명칭 / 링크</th><th>추천 획득처</th></tr></thead><tbody id="comparisonBody"></tbody></table>`;
        const tbody = document.getElementById('comparisonBody');
        const whList = [...(specData.wh || [])];
        
        SLOT_TEMPLATE.forEach(slot => {
            const wh = whList.find(item => slot.synonyms.includes(item.s)) || {s:"-", id:"", src:"-"};
            if(wh.id) whList.splice(whList.indexOf(wh), 1);

            // 제작 아이템 판별 로직 및 ilvl 285 적용
            const srcStr = (wh.src || "").toLowerCase();
            const isCrafted = srcStr.includes("craft") || srcStr.includes("tailoring") || srcStr.includes("blacksmithing") || srcStr.includes("leatherworking") || srcStr.includes("jewelcrafting") || srcStr.includes("inscription");
            const ilvl = isCrafted ? 285 : 289;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:#aaa; font-weight:bold; background:#1a1a1a;">${slot.label}</td>
                <td>${wh.id ? `<a href="https://www.wowhead.com/ko/item=${wh.id}&ilvl=${ilvl}" data-wowhead="item=${wh.id}">...</a> ${isCrafted ? '<br><span class="crafted-tag">[제작 아이템 - 285 레벨]</span>' : ''}` : '-'}</td>
                <td style="color:#888;">${wh.src}</td>
            `;
            tbody.appendChild(tr);
        });
        if(window.$WowheadPower) $WowheadPower.refreshLinks();
    }

    function calculate() {
        const N = parseInt(document.getElementById('total').value);    // 전체 드랍 아이템 수
        const K = parseInt(document.getElementById('target').value);   // 원하는 아이템 수
        const n = parseInt(document.getElementById('dice').value);     // 던지는 주사위 수 (샘플 수)

        // 유효성 검사
        if (!N || N < 1) return alert("전체 드랍 아이템 수(N)를 입력하세요.");
        if (!K || K < 1) return alert("원하는 아이템 수를 입력하세요.");
        if (K > N) return alert("원하는 템 수가 전체 드랍 수(N)보다 많을 수 없습니다.");
        if (n < 1 || n > 3) return alert("주사위는 1~3개까지만 가능합니다.");
        if (n > N) return alert("주사위 수가 전체 드랍 수보다 클 수 없습니다.");

        // 조합(Combination) 계산 함수: nCr
        function combination(n, r) {
            if (r < 0 || r > n) return 0;
            if (r === 0 || r === n) return 1;
            if (r > n / 2) r = n - r;
            let res = 1;
            for (let i = 1; i <= r; i++) {
                res = res * (n - i + 1) / i;
            }
            return res;
        }

        // 초기하분포 확률 계산 함수 (HYPGEOM.DIST 로직)
        // P(X = k) = (K C k) * (N-K C n-k) / (N C n)
        function getHypgeom(k) {
            const numerator = combination(K, k) * combination(N - K, n - k);
            const denominator = combination(N, n);
            return numerator / denominator;
        }

        // 각 케이스별 확률 계산
        const prob0 = getHypgeom(0); // 0개 당첨 (전부 꽝)
        const prob1 = getHypgeom(1); // 정확히 1개 당첨
        const prob2 = (n >= 2) ? getHypgeom(2) : 0; // 정확히 2개 당첨
        const prob3 = (n >= 3) ? getHypgeom(3) : 0; // 정확히 3개 당첨
        
        const atLeastOne = (1 - prob0) * 100; // 적어도 1개 당첨 확률

        // 결과 출력
        let resultHTML = `<div class="res-box" style="text-align:left; font-size:0.85em; line-height:1.8;">`;
        resultHTML += `<b style="color:#f8b700; font-size:1.1em;">[비복원 분석: 주사위 ${n}개 / 목표 ${K}개]</b><br>`;
        resultHTML += `<span style="color:#00ff00; font-size:1.1em;">• 적어도 1개 당첨: ${atLeastOne.toFixed(2)}%</span><br>`;
        resultHTML += `<hr style="border:0.1px solid #333; margin:8px 0;">`;
        
        resultHTML += `• 1개는 당첨될 확률: ${(prob1 * 100).toFixed(2)}%<br>`;
        
        if (n >= 2) {
            resultHTML += `• 2개 다 당첨될 확률: ${(prob2 * 100).toFixed(2)}%<br>`;
        }
        if (n === 3) {
            resultHTML += `• 3개 다 대박일 확률: ${(prob3 * 100).toFixed(2)}%<br>`;
        }

        resultHTML += `</div>`;
        document.getElementById('calcResult').innerHTML = resultHTML;
    }
